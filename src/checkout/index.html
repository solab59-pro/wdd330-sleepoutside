<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep Outside | Checkout</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Simple header -->
  <header class="divider">
    <div class="logo">
      <a href="../index.html">
        Sleep <span class="highlight">Outside</span>
      </a>
    </div>
    <div class="cart">
      <a href="../cart/">
        🛒 View Cart
      </a>
    </div>
  </header>

  <main class="divider">
    <h1>Checkout</h1>

    <form id="checkoutForm">
      <h2>Customer Info</h2>
      <label>First Name: <input type="text" name="fname" required></label>
      <label>Last Name: <input type="text" name="lname" required></label>
      <label>Street Address: <input type="text" name="street" required></label>
      <label>City: <input type="text" name="city" required></label>
      <label>State: <input type="text" name="state" required></label>
      <label>ZIP Code: <input type="text" name="zip" required></label>

      <h2>Payment Info</h2>
      <label>Credit Card Number: <input type="text" name="cardNumber" required value="1234123412341234"></label>
      <label>Expiration Date: <input type="text" name="expiration" required value="12/25"></label>
      <label>Security Code: <input type="text" name="code" required value="123"></label>

      <button type="submit">Submit Order</button>
    </form>

    <div class="order-summary">
      <h3>Order Summary</h3>
      <p>Subtotal: $<span id="subtotal">0.00</span></p>
      <p>Tax (6%): $<span id="tax">0.00</span></p>
      <p>Shipping: $<span id="shipping">0.00</span></p>
      <p><strong>Order Total: $<span id="orderTotal">0.00</span></strong></p>
    </div>

    <div id="checkoutMessage" style="margin-top: 1rem; font-weight: bold;"></div>
  </main>

  <footer>&copy; NOT a real business</footer>

  <script type="module">
    import CheckoutProcess from './CheckoutProcess.mjs';
    const checkout = new CheckoutProcess('checkoutForm');

    // Load cart from localStorage and calculate order summary
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    let subtotal = 0;
    cart.forEach(item => subtotal += Number(item.price) * Number(item.quantity));

    document.getElementById('subtotal').textContent = subtotal.toFixed(2);
    document.getElementById('tax').textContent = (subtotal * 0.06).toFixed(2);
    const shippingCost = cart.length > 0 ? (10 + (cart.length - 1) * 2) : 0;
    document.getElementById('shipping').textContent = shippingCost.toFixed(2);
    document.getElementById('orderTotal').textContent = (
      subtotal + subtotal * 0.06 + shippingCost
    ).toFixed(2);

    // Add submit listener
    const checkoutForm = document.getElementById('checkoutForm');
    checkoutForm.addEventListener('submit', e => {
      e.preventDefault();
      // Process order (could add more logic here)
      localStorage.removeItem('cart'); // clear cart
      checkoutForm.reset(); // reset form
      document.getElementById('checkoutMessage').textContent = "Order submitted! Thank you.";
    });
  </script>

</body>
</html>
